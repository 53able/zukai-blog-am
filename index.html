<body class="page-index">
  <header class="gallery-topbar site-chrome-bar" aria-label="サイト">
    <div class="gallery-topbar-inner">
      <span class="gallery-topbar-brand">図解ギャラリー</span>
      <a class="gallery-topbar-link" href="https://tech.algomatic.jp/">Algomatic Tech Blog</a>
    </div>
  </header>
  <section class="gallery-hero" aria-labelledby="gallery-title">
    <div class="gallery-hero-inner">
      <p class="gallery-kicker"><span class="gallery-kicker-dot" aria-hidden="true"></span>zukai-creator · 非公式図解</p>
      <h1 id="gallery-title">Algomatic Tech Blog<br />図解ギャラリー</h1>
      <p class="gallery-lead">Tech Blog の記事を、読みやすい図解構成に再編集した一覧です。全文は各元記事へ。</p>
      <p class="gallery-stat" data-gallery-stat>読み込み中</p>
    </div>
  </section>
  <main class="gallery-main">
    <div class="gallery-list" aria-label="図解一覧" aria-busy="true" data-gallery-list>
      <article class="gallery-card">
        <div class="gallery-card-body">
          <p class="gallery-card-lead">manifest.json を読み込んでいます。</p>
        </div>
      </article>
    </div>
  </main>
  <footer class="footer site-chrome-footer">
      <p>Algomatic Tech Blog の記事を zukai-creator で再構成した非公式図解です。</p>
      <p>© 図解構成: Go (@53able) · Designed with Apple-style tokens</p>
    </footer>
  <script type="module">
    const MANIFEST_URL = "manifest.json";
    const dateFormatter = new Intl.DateTimeFormat("ja-JP", {
      year: "numeric",
      month: "long",
      day: "numeric",
      timeZone: "Asia/Tokyo",
    });

    const getElement = (selector) => {
      const element = document.querySelector(selector);
      if (!element) {
        throw new Error(`${selector} not found`);
      }
      return element;
    };

    const galleryList = getElement("[data-gallery-list]");
    const galleryStat = getElement("[data-gallery-stat]");

    const createElement = (tagName, className, text) => {
      const element = document.createElement(tagName);
      if (className) {
        element.className = className;
      }
      if (text) {
        element.textContent = text;
      }
      return element;
    };

    const createLink = (className, href, text) => {
      const link = createElement("a", className, text);
      link.href = href;
      return link;
    };

    const isObject = (value) => typeof value === "object" && value !== null;
    const hasString = (value, key) => typeof value[key] === "string";

    const isEntry = (value) =>
      isObject(value) &&
      hasString(value, "title") &&
      hasString(value, "publishedAt") &&
      hasString(value, "htmlPath") &&
      hasString(value, "sourceUrl") &&
      hasString(value, "sourceTitle") &&
      hasString(value, "lead");

    const readManifest = (value) => {
      if (!isObject(value) || !Array.isArray(value.entries) || !value.entries.every(isEntry)) {
        throw new Error("manifest.json format is invalid");
      }
      return value;
    };

    const formatDate = (isoDate) => {
      const date = new Date(`${isoDate}T00:00:00+09:00`);
      return dateFormatter.format(date);
    };

    const renderStat = (entryCount) => {
      const count = createElement("span", "tabular-nums", String(entryCount));
      galleryStat.replaceChildren(count, document.createTextNode(" 件の図解"));
    };

    const renderStatus = (message, statText) => {
      const card = createElement("article", "gallery-card", "");
      const body = createElement("div", "gallery-card-body", "");
      const lead = createElement("p", "gallery-card-lead", message);
      body.append(lead);
      card.append(body);
      galleryList.replaceChildren(card);
      galleryList.setAttribute("aria-busy", "false");
      galleryStat.textContent = statText;
    };

    const renderCard = (entry) => {
      const article = createElement("article", "gallery-card", "");
      const meta = createElement("div", "gallery-card-meta", "");
      const time = createElement("time", "gallery-card-date", formatDate(entry.publishedAt));
      const body = createElement("div", "gallery-card-body", "");
      const heading = createElement("h2", "", "");
      const titleLink = createLink("", entry.htmlPath, entry.title);
      const lead = createElement("p", "gallery-card-lead", entry.lead);
      const foot = createElement("div", "gallery-card-foot", "");
      const source = createElement("p", "gallery-card-source", "元記事 ");
      const sourceLink = createLink("", entry.sourceUrl, entry.sourceTitle);
      const cta = createLink("gallery-card-cta", entry.htmlPath, "図解を見る");

      time.dateTime = entry.publishedAt;
      meta.append(time);
      heading.append(titleLink);
      source.append(sourceLink);
      foot.append(source, cta);
      body.append(heading, lead, foot);
      article.append(meta, body);

      return article;
    };

    const renderEntries = (entries) => {
      if (entries.length === 0) {
        renderStatus("図解はまだありません。", "0 件の図解");
        return;
      }

      galleryList.replaceChildren(...entries.map(renderCard));
      galleryList.setAttribute("aria-busy", "false");
      renderStat(entries.length);
    };

    const loadManifest = async () => {
      const response = await fetch(MANIFEST_URL, { cache: "no-cache" });
      if (!response.ok) {
        throw new Error(`manifest fetch failed: ${response.status}`);
      }

      const manifest = readManifest(await response.json());
      renderEntries(manifest.entries);
    };

    loadManifest().catch(() => {
      renderStatus("図解一覧を読み込めませんでした。時間を置いて再読み込みしてください。", "読み込み失敗");
    });
  </script>
</body>
